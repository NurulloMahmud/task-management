{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Login</title>
    <link rel="stylesheet" href="{% static 'front/css/style.css' %}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-logo">TaskFlow</h1>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <div id="login-error" class="form-error"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="reg-password-confirm">Confirm Password</label>
                    <input type="password" id="reg-password-confirm" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
                <div id="register-error" class="form-error"></div>
            </form>
        </div>
    </div>

    <script src="{% static 'front/js/auth.js' %}"></script>
</body>

</html>
